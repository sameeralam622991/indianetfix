<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>India Net Fix</title>

  <style>
    body{font-family:Arial;margin:0;background:#f2f4f7;color:#222}
    header{background:#0b5ed7;color:#fff;padding:18px;text-align:center}
    main{max-width:900px;margin:20px auto;padding:16px}
    button{padding:12px 18px;border:none;border-radius:8px;background:#0b5ed7;color:#fff;font-size:16px;cursor:pointer}
    .card{background:#fff;border-radius:10px;padding:16px;margin-top:16px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
    .ok{color:green;font-weight:bold}
    .bad{color:red;font-weight:bold}
  </style>
</head>

<body>

<header>
  <h1>India Net Fix</h1>
  <p>Bank site, UPI, DNS problem? 10 second me test karo aur fix pao.</p>
</header>

<main>

  <div class="card">
    <button onclick="startTest()">Start Network Test</button>
  </div>

  <div id="results" class="card" style="display:none">
    <h3>Test Results</h3>
    <ul id="resultList"></ul>
  </div>

  <div id="fixes" class="card" style="display:none">
    <h3>Recommended Fix</h3>
    <div id="fixText"></div>
  </div>

</main>

<script>
function addResult(text, cls){
  const li=document.createElement("li");
  li.className=cls;
  li.innerText=text;
  document.getElementById("resultList").appendChild(li);
}

function deviceDetect(){
  const ua=navigator.userAgent.toLowerCase();
  if(ua.includes("android")) return "Android";
  if(ua.includes("windows")) return "Windows";
  if(ua.includes("iphone")||ua.includes("ipad")) return "iPhone";
  return "Other";
}

async function startTest(){
  document.getElementById("results").style.display="block";
  document.getElementById("fixes").style.display="block";
  document.getElementById("resultList").innerHTML="";

  let issues=[];
  const device=deviceDetect();

  addResult("Device Detected: "+device,"ok");

  // DNS test (safe)
  try{
    await fetch("https://1.1.1.1/cdn-cgi/trace",{mode:"no-cors"});
    addResult("Internet reachable. DNS basic test passed.","ok");
  }catch{
    addResult("DNS/Internet issue detected.","bad");
    issues.push("dns");
  }

  // Indian site reach test
  try{
    await fetch("https://www.sbi.co.in",{mode:"no-cors"});
    addResult("Indian bank site reachable.","ok");
  }catch{
    addResult("Indian bank site not reachable.","bad");
    issues.push("bank");
  }

  showFix(issues,device);
}

function showFix(issues,device){
  let fix="";

  if(issues.length===0){
    fix="<p class='ok'>Koi major issue detect nahi hua. Browser cache clear karke try kare.</p>";
  }else{
    fix+="<ul>";
    if(issues.includes("dns")){
      fix+="<li>DNS change kare: 1.1.1.1 aur 8.8.8.8 set kare.</li>";
    }
    if(issues.includes("bank")){
      fix+="<li>VPN band kare, router restart kare, DNS set kare.</li>";
    }
    fix+="</ul>";
  }

  if(device==="Android"){
    fix+="<h4>Android Steps:</h4><ol><li>WiFi long press → Modify</li><li>IP Settings → Static</li><li>DNS: 1.1.1.1, 8.8.8.8</li></ol>";
  }
  else if(device==="Windows"){
    fix+="<h4>Windows Steps:</h4><ol><li>Network Adapter → IPv4</li><li>Use following DNS</li><li>1.1.1.1, 8.8.8.8</li></ol>";
  }
  else if(device==="iPhone"){
    fix+="<h4>iPhone Steps:</h4><ol><li>WiFi → (i)</li><li>Configure DNS → Manual</li><li>1.1.1.1 add kare</li></ol>";
  }

  document.getElementById("fixText").innerHTML=fix;
}
</script>

</body>
</html>
